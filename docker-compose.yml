version: "3.9"

services:

  # ────────────────────────────────────────────────────────────────────────────
  # PostgreSQL Database
  # ────────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: gold-finance-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: gold_finance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - gold-finance-net

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gold_finance"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ────────────────────────────────────────────────────────────────────────────
  # Spring Boot Backend
  # ────────────────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    image: gold-finance-backend:latest
    container_name: gold-finance-backend
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      SERVER_PORT: "8080"

      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/gold_finance}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-root}

      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}

      JWT_SECRET: ${JWT_SECRET:-V2l0aC1hLWdvbGQtZmluYW5jZS1zZWNyZXQta2V5LWNoYW5nZS1tZS0zMi1jaGFycw==}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:-720}

      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}

    volumes:
      - uploads:/app/uploads
      - logs:/app/logs

    networks:
      - gold-finance-net

    ports:
      - "8053:8080"

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ────────────────────────────────────────────────────────────────────────────
  # React Frontend (Nginx)
  # ────────────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    image: gold-finance-frontend:latest
    container_name: gold-finance-frontend
    restart: unless-stopped

    depends_on:
      backend:
        condition: service_healthy

    ports:
      - "${APP_PORT:-80}:80"

    networks:
      - gold-finance-net

# ──────────────────────────────────────────────────────────────────────────────
# Named Volumes
# ──────────────────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  uploads:
  logs:

# ──────────────────────────────────────────────────────────────────────────────
# Networks
# ──────────────────────────────────────────────────────────────────────────────
networks:
  gold-finance-net:
    driver: bridge