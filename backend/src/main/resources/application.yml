server:
  port: ${SERVER_PORT:8053}
spring:
  application:
    name: gold-finance-management
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/gold_finance}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
  flyway:
    enabled: true
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 40MB

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  file:
    name: logs/gold-finance.log
  level:
    com.goldfinance: INFO
    org.springframework.security: INFO

springdoc:
  swagger-ui:
    path: /swagger-ui

app:
  security:
    jwt-secret: ${JWT_SECRET:V2l0aC1hLWdvbGQtZmluYW5jZS1zZWNyZXQta2V5LWNoYW5nZS1tZS0zMi1jaGFycw==}
    jwt-expiration-minutes: ${JWT_EXPIRATION_MINUTES:720}
    admin-username: ${ADMIN_USERNAME:admin}
    admin-password: ${ADMIN_PASSWORD:admin123}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost,http://localhost:5174,http://localhost:20568}
  storage:
    upload-dir: ${UPLOAD_DIR:uploads}

